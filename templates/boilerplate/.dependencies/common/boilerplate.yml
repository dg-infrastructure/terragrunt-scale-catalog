variables:
  - name: TerragruntVersion
    type: string
    description: The version of Terragrunt to use.
    default: "1.0.0"
    order: 1

  - name: OpenTofuVersion
    type: string
    description: The version of OpenTofu to use.
    default: "1.11.5"
    order: 2

  - name: DeployBranch
    type: string
    description: The branch to use for bootstrapping Pipelines.
    default: "main"
    order: 3

  - name: ConsolidateComments
    type: bool
    description: Whether Pipelines should update a single PR/MR comment in-place on each push instead of creating a new comment.
    default: false
    order: 4
