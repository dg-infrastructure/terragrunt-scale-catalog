# Slim, auth-less variant of .dependencies/aws/account used by the TGS "Run your first pipeline"
# wizard (DEV-1496). Emits ONLY the Pipelines environment file with an empty authentication block.
# It deliberately omits everything that requires cloud credentials: no S3 state backend (root.hcl),
# no account.hcl/region.hcl, and no bootstrap stack (OIDC provider + IAM roles). A self-contained
# null_resource tutorial unit added on top runs plan/apply with NO cloud credentials.
variables:
  - name: AccountName
    type: string
    description: The Pipelines environment name for the auth-less tutorial pass (e.g. "pipelines-tutorial"). Tutorial units live under <AccountName>/.
    order: 1
