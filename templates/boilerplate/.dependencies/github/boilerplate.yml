variables:
  - name: PipelinesWorkflowsRef
    type: string
    description: The Git reference for the Pipelines GitHub Actions workflow.
    default: "v4"
    order: 1

  - name: DeployBranch
    type: string
    description: The branch with live infrastructure to be deployed.
    default: "main"
    order: 2

  - name: NewCommentPerPush
    type: bool
    description: Whether each push creates a new status comment (true) or updates the existing one in-place (false). GitHub preserves comment edit history when updating in-place.
    default: false
    order: 3
